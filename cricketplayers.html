<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cricket Players</title>
    <meta property="og:title" content="Knowing About Cricketers">

<meta name="title" content="Knowing About Cricketers">
   <link rel="icon" type="image/png" href="logo.png">


  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:linear-gradient(to right, #141e30, #243b55);
      color:white;
      overflow-x:hidden;
    }

   .back-arrow{
  position:fixed;
  top:20px;
  left:20px;
  width:55px;
  height:55px;
  background:#00ffcc;
  color:black;
  text-decoration:none;
  font-size:32px;
  font-weight:bold;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
  padding-bottom:3px;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
  transition:0.4s;
  z-index:1000;
}
    }

    .back-arrow:hover{
      background:white;
      transform:scale(1.1);
    }

    .top-section{
      text-align:center;
      padding:60px 20px;
    }

    .top-section h1{
      font-size:60px;
      color:#00ffcc;
      margin-bottom:20px;
      text-shadow:0 0 15px #00ffcc;
    }

    .top-section p{
      font-size:20px;
      color:#f1f1f1;
    }

    .search-box{
      display:flex;
      justify-content:center;
      margin-top:40px;
    }

    .search-box input{
      width:60%;
      max-width:600px;
      padding:18px;
      border:none;
      border-radius:40px;
      outline:none;
      font-size:18px;
      box-shadow:0 0 15px rgba(0,0,0,0.5);
    }

    .players-container{
      display:flex;
      justify-content:center;
      align-items:flex-start;
      flex-wrap:wrap;
      gap:30px;
      padding:50px;
    }

    .player-card{
      width:280px;
      background:rgba(255,255,255,0.1);
      border-radius:20px;
      overflow:hidden;
      backdrop-filter:blur(10px);
      transition:0.4s;
      cursor:pointer;
    }

    .player-card:hover{
      transform:translateY(-10px);
    }

    .player-card img{
      width:100%;
      height:320px;
      object-fit:cover;
    }

    .player-content{
      padding:20px;
      text-align:center;
    }

    .player-content h2{
      color:#00ffcc;
    }

    /* MOBILE RESPONSIVE */

    @media screen and (max-width:768px){

      body{
        overflow-x:hidden;
      }

    .back-arrow{
  width:45px;
  height:45px;
  font-size:26px;
  top:15px;
  left:15px;
  padding-bottom:2px;
}
      .top-section{
        padding:80px 15px 40px;
      }

      .top-section h1{
        font-size:38px;
        line-height:1.3;
      }

      .top-section p{
        font-size:16px;
        margin-top:10px;
      }

      .search-box{
        margin-top:25px;
      }

      .search-box input{
        width:95%;
        padding:14px;
        font-size:16px;
      }

      .players-container{
        padding:25px 15px 40px;
        gap:20px;
      }

      .player-card{
        width:100%;
        max-width:320px;
      }

      .player-card img{
        height:280px;
      }

      .player-content{
        padding:16px;
      }

      .player-content h2{
        font-size:22px;
      }

    }

  </style>

</head>

<body>

  <!-- Back Arrow -->

  <a href="index.html" class="back-arrow">
    ←
  </a>

  <!-- Top Section -->

  <div class="top-section">

    <h1>CRICKET PLAYERS</h1>

    <p>Search and learn about your favorite cricketers</p>

    <div class="search-box">

      <input 
        type="text"
        id="searchInput"
        placeholder="Type here to search cricketers"
        onkeyup="searchPlayers()"
      >

    </div>

  </div>

  <!-- Players Section -->

  <div class="players-container" id="playersContainer">

    <!-- Virat Kohli -->

    <a href="viratkohli.html" style="text-decoration:none; color:white;">

      <div class="player-card">

        <img src="Kohli.png">

        <div class="player-content">
          <h2>Virat Kohli</h2>
        </div>

      </div>

    </a>

    <!-- Rohit Sharma -->

    <a href="rohitsharma.html" style="text-decoration:none; color:white;">

      <div class="player-card">

        <img src="OIP (1).webp">

        <div class="player-content">
          <h2>Rohit Sharma</h2>
        </div>

      </div>

    </a>

    <!-- Ishan Kishan -->

    <a href="ishankishan.html" style="text-decoration:none; color:white;">

      <div class="player-card">

        <img src="Ishan.png">

        <div class="player-content">
          <h2>Ishan Kishan</h2>
        </div>

      </div>

    </a>

    <!-- Pat Cummins -->

    <a href="patcummins.html" style="text-decoration:none; color:white;">

      <div class="player-card">

        <img src="patcummins.jpg">

        <div class="player-content">
          <h2>Pat Cummins</h2>
        </div>

      </div>

    </a>

    <!-- MS Dhoni -->

    <a href="msdhoni.html" style="text-decoration:none; color:white;">

      <div class="player-card">

        <img src="Dhoni.png">

        <div class="player-content">
          <h2>MS Dhoni</h2>
        </div>

      </div>

    </a>
      <!--Sachin Tendulkar -->

    <a href="sachintendulkar.html" style="text-decoration:none; color:white;">

      <div class="player-card">

        <img src="Sachin.png">

        <div class="player-content">
          <h2>Sachin Tendulkar</h2>
        </div>

      </div>

    </a>

  </div>


  <script>

    function searchPlayers(){

      let input = document.getElementById("searchInput").value.toLowerCase();

      let cards = document.getElementsByClassName("player-card");

      for(let i = 0; i < cards.length; i++){

        let title = cards[i].getElementsByTagName("h2")[0];

        let textValue = title.textContent || title.innerText;

        if(textValue.toLowerCase().indexOf(input) > -1){
          cards[i].parentElement.style.display = "block";
        }
        else{
          cards[i].parentElement.style.display = "none";
        }

      }

    }

  </script>

</body>

</html>
