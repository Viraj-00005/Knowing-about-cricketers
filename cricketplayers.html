<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cricket Players</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:linear-gradient(to right, #141e30, #243b55);
      color:white;
    }

    .top-section{
      text-align:center;
      padding:60px 20px;
    }

    .top-section h1{
      font-size:60px;
      color:#00ffcc;
      margin-bottom:20px;
      text-shadow:0 0 15px #00ffcc;
    }

    .top-section p{
      font-size:20px;
      color:#f1f1f1;
    }

    .search-box{
      display:flex;
      justify-content:center;
      margin-top:40px;
    }

    .search-box input{
      width:60%;
      max-width:600px;
      padding:18px;
      border:none;
      border-radius:40px;
      outline:none;
      font-size:18px;
      box-shadow:0 0 15px rgba(0,0,0,0.5);
    }

    .players-container{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:30px;
      padding:50px;
    }

    .player-card{
      width:280px;
      background:rgba(255,255,255,0.1);
      border-radius:20px;
      overflow:hidden;
      backdrop-filter:blur(10px);
      transition:0.4s;
    }

    .player-card:hover{
      transform:translateY(-10px);
    }

    .player-card img{
      width:100%;
      height:300px;
      object-fit:cover;
    }

    .player-content{
      padding:20px;
    }

    .player-content h2{
      color:#00ffcc;
      margin-bottom:10px;
    }

    .player-content p{
      color:#eeeeee;
      line-height:1.5;
    }

  </style>

</head>

<body>

  <div class="top-section">

    <h1>CRICKET PLAYERS</h1>

    <p>Search and learn about your favorite cricketers</p>

    <div class="search-box">

      <input 
        type="text"
        id="searchInput"
        placeholder="Type here to search cricketers"
        onkeyup="searchPlayers()"
      >

    </div>

  </div>

  <div class="players-container" id="playersContainer">

  <a href="viratkohli.html" style="text-decoration:none; color:white;">

    <div class="player-card">

      <img src="OIP.webp">

      <div class="player-content">
        <h2>Virat Kohli</h2>
      </div>

    </div>

    <div class="player-card">

     <img src="02ishan-kishan.webp">

      <div class="player-content">
        <h2>Ishan Kishan</h2>
      </div>

    </div>

    <div class="player-card">

      <img src="OIP (1).webp">

      <div class="player-content">
        <h2>Rohit Sharma</h2>
      </div>

    </div>

  </div>

  <script>

    function searchPlayers(){

      let input = document.getElementById("searchInput").value.toLowerCase();

      let cards = document.getElementsByClassName("player-card");

      for(let i = 0; i < cards.length; i++){

        let title = cards[i].getElementsByTagName("h2")[0];

        let textValue = title.textContent || title.innerText;

        if(textValue.toLowerCase().indexOf(input) > -1){
          cards[i].style.display = "";
        }
        else{
          cards[i].style.display = "none";
        }

      }

    }

  </script>

</body>
</html>
